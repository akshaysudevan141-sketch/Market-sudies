name: 📊 Auto-Update Sector Returns

on:
  schedule:
    - cron: '30 10 * * 1-5'   # 4:00 PM IST (market closes 3:30 PM)
    - cron: '00 12 * * 1-5'   # 5:30 PM IST (settled data)
  workflow_dispatch:           # Manual trigger from GitHub UI

jobs:
  update-sector-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 📡 Fetch NSE Sector Returns
        id: fetch
        run: node scripts/fetch_sectors.js

      - name: 💾 Commit updated sector data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sector-returns.json
          if git diff --staged --quiet; then
            echo "ℹ️ No new sector data today (market may be closed)."
          else
            git commit -m "data: sector returns auto-update $(date +'%d-%b-%Y %H:%M UTC')"
            git push
          fi
