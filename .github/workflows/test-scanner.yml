name: 🔍 NSE Scanner

on:
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * 1-5'   # 4:30 PM IST Mon-Fri

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install
        run: |
          pip install yfinance pandas numpy requests

      - name: 🔍 Scan ALL Stocks — ALL Timeframes
        run: python3 scripts/scanner/stock_scanner.py

      - name: 📊 Summary
        run: |
          python3 -c "
          import json
          d = json.load(open('data/scanner-results.json'))
          print(f'Total stocks : {d[\"_total_stocks\"]}')
          print(f'Updated      : {d[\"_updated_at\"]}')
          print(f'Market       : {d[\"_market\"][\"status\"]}')
          for tf, s in d['summary'].items():
              print(f'\n[{tf.upper()}] Scanned:{s[\"total_scanned\"]} | SB:{s[\"strong_buy\"]} | B:{s[\"buy\"]} | Pattern:{s[\"with_pattern\"]} | Sell:{s[\"sell\"]+s[\"strong_sell\"]}')
              top = [r for r in d['results'][tf] if r['signal'] in ['STRONG BUY','BUY']][:5]
              for r in top:
                  idx = ', '.join(r['indices'][:2])
                  p   = ', '.join(r['patterns']['bullish'][:1]) or '-'
                  print(f'  {r[\"symbol\"]:15} {r[\"signal\"]:12} RSI:{str(r[\"rsi\"]):>5}  [{idx}]  {p}')
          "

      - name: 📁 Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: nse-scan-run${{ github.run_number }}
          path: data/scanner-results.json
          retention-days: 30
