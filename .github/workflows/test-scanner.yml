name: 🔍 NSE Scanner

on:
  workflow_dispatch:
    inputs:
      refresh_symbols:
        description: 'Re-fetch NSE symbol list from NSE India?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

  # Auto run Mon-Fri after market close 4:30 PM IST = 11:00 UTC
  schedule:
    - cron: '0 11 * * 1-5'

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: |
          pip install yfinance pandas numpy requests

      # ── Step 1: Fetch & validate all NSE symbols from Yahoo ──
      - name: 📋 Fetch All NSE Symbols from Yahoo Finance
        run: |
          python3 scripts/scanner/fetch_nse_symbols.py

      - name: 📊 Show Symbol Stats
        run: |
          python3 -c "
          import json
          d = json.load(open('data/nse_symbols.json'))
          print(f'Total valid NSE symbols : {d[\"_total_valid\"]}')
          print(f'Total invalid/not found : {d[\"_total_invalid\"]}')
          print(f'Updated at              : {d[\"_updated_at\"]}')
          print()
          # Show index breakdown
          from collections import Counter
          idx_count = Counter()
          for sym, info in d['symbols'].items():
              for idx in info['indices']:
                  idx_count[idx] += 1
          print('Index Breakdown:')
          for idx, count in sorted(idx_count.items(), key=lambda x: -x[1]):
              print(f'  {idx:<25} {count} stocks')
          "

      # ── Step 2: Run full scan all timeframes ─────────────────
      - name: 🔍 Scan ALL NSE Stocks — ALL Timeframes
        run: |
          python3 scripts/scanner/stock_scanner.py \
            --timeframes 5m 15m 1h 1d 1wk

      # ── Step 3: Show results summary ─────────────────────────
      - name: 📈 Show Scan Results
        run: |
          python3 -c "
          import json
          d = json.load(open('data/scanner-results.json'))
          print('=' * 65)
          print(f'NSE SCANNER — FULL RESULTS')
          print(f'Stocks   : {d[\"_total_stocks\"]}')
          print(f'Updated  : {d[\"_updated_at\"]}')
          print(f'Market   : {d[\"_market\"][\"status\"]}')
          print('=' * 65)
          for tf, s in d['summary'].items():
              print(f'\n── {tf.upper()} ──')
              print(f'  Scanned    : {s[\"total_scanned\"]}')
              print(f'  Strong Buy : {s[\"strong_buy\"]}')
              print(f'  Buy        : {s[\"buy\"]}')
              print(f'  Neutral    : {s[\"neutral\"]}')
              print(f'  Sell       : {s[\"sell\"]}')
              print(f'  Strong Sell: {s[\"strong_sell\"]}')
              print(f'  Pattern    : {s[\"with_pattern\"]}')
              top = [r for r in d['results'][tf] if r['signal'] in ['STRONG BUY','BUY']][:8]
              if top:
                  print(f'  Top Picks:')
                  for r in top:
                      idx = ', '.join(r['indices'][:2]) if r['indices'] else 'NSE'
                      p   = ', '.join(r['patterns']['bullish'][:1]) or '-'
                      print(f'    {r[\"symbol\"]:15} {r[\"signal\"]:12} RSI:{str(r[\"rsi\"]):>5}  [{idx}]  {p}')
          "

      # ── Upload artifacts ──────────────────────────────────────
      - name: 📁 Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: nse-scan-run${{ github.run_number }}
          path: |
            data/scanner-results.json
            data/nse_symbols.json
          retention-days: 30
