name: 🔍 NSE Scanner (Every 3 Min)

on:
  # Manual trigger
  workflow_dispatch:

  schedule:
    # ── Starts the 3-min loop job at market open ──────────────
    # IST = UTC+5:30 | 9:15 AM IST = 3:45 UTC
    - cron: '45 3 * * 1-5'    # 9:15 AM IST — market open (Mon-Fri)
    - cron: '0 11 * * 1-5'    # 4:30 PM IST — EOD full scan

# Give write permission to commit results back to repo
permissions:
  contents: write

jobs:
  scanner:
    runs-on: ubuntu-latest
    timeout-minutes: 360      # 6 hours max

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install
        run: pip install yfinance pandas numpy requests

      - name: ✅ Check Symbol Cache
        run: |
          python3 -c "
          import json, os, sys
          path = 'data/nse_symbols.json'
          if not os.path.exists(path):
              print('❌ nse_symbols.json missing! Run Fetch NSE Symbols workflow first.')
              sys.exit(1)
          d = json.load(open(path))
          print(f'✅ {d[\"_total_valid\"]} NSE stocks ready')
          print(f'   Updated: {d[\"_updated_at\"]}')
          "

      # ── 3-minute loop — runs for up to 6 hours ───────────────
      - name: 🔄 Scan Every 3 Minutes
        run: |
          python3 << 'PYEOF'
          import subprocess, time, json, os
          from datetime import datetime, timezone, timedelta

          IST      = timezone(timedelta(hours=5, minutes=30))
          INTERVAL = 180        # 3 minutes
          MAX_SECS = 5.75 * 3600
          start    = time.time()
          count    = 0

          def get_timeframes():
              """Pick timeframes based on current market time."""
              now = datetime.now(IST)
              h, m = now.hour, now.minute
              # Pre-market / after hours → only daily + weekly
              if h < 9 or (h == 9 and m < 15) or h >= 16:
                  return ["1d", "1wk"]
              # Market opening (9:15–9:45) — volatile, short TFs only
              elif h == 9 and m < 45:
                  return ["5m", "15m"]
              # Mid morning (9:45–12:00)
              elif h < 12:
                  return ["5m", "15m", "30m", "1h"]
              # Afternoon (12:00–3:30)
              else:
                  return ["5m", "15m", "30m", "1h", "1d"]

          def is_scan_time():
              now = datetime.now(IST)
              if now.weekday() >= 5:
                  return False
              s = now.replace(hour=9,  minute=0,  second=0)
              e = now.replace(hour=17, minute=0,  second=0)
              return s <= now <= e

          def git_push(count, tfs):
              ts = datetime.now(IST).strftime("%d-%b %H:%M IST")
              os.system("git config user.name 'github-actions[bot]'")
              os.system("git config user.email 'github-actions[bot]@users.noreply.github.com'")
              os.system("git pull --rebase origin main 2>/dev/null || true")
              os.system("git add data/scanner-results.json")
              msg = f"scan: #{count} {ts} TF:[{' '.join(tfs)}]"
              os.system(f'git diff --cached --quiet || git commit -m "{msg}"')
              ret = os.system("git push origin HEAD:main 2>/dev/null")
              if ret != 0:
                  print("  ⚠️  Push failed — will retry next scan")

          print("━" * 60)
          print("🔄 NSE Scanner — 3 Minute Loop")
          now_ist = datetime.now(IST)
          print(f"   Started : {now_ist.strftime('%d-%b-%Y %H:%M IST')}")
          print(f"   Max run : 5.75 hours")
          print(f"   Interval: 3 minutes")
          print("━" * 60)

          while True:
              elapsed = time.time() - start
              if elapsed >= MAX_SECS:
                  print(f"\n⏹  Max runtime reached. Stopping.")
                  break

              if not is_scan_time():
                  now = datetime.now(IST)
                  print(f"\n⏸  Outside hours ({now.strftime('%H:%M IST')}). Sleeping 60s...")
                  time.sleep(60)
                  continue

              count += 1
              tfs = get_timeframes()
              ts  = datetime.now(IST).strftime("%H:%M:%S IST")

              print(f"\n{'─'*55}")
              print(f"🔍 Scan #{count} | {ts} | TF: {' '.join(tfs)}")
              print(f"{'─'*55}")

              r = subprocess.run(
                  ["python3", "scripts/scanner/stock_scanner.py",
                   "--timeframes"] + tfs
              )

              if r.returncode == 0:
                  git_push(count, tfs)
                  try:
                      d = json.load(open("data/scanner-results.json"))
                      for tf, s in d["summary"].items():
                          print(f"  [{tf.upper():<4}] "
                                f"Total:{s['total_scanned']:>4} | "
                                f"🟢{s['strong_buy']:>3} SB | "
                                f"🔵{s['buy']:>3} B | "
                                f"📊{s['with_pattern']:>3} Pat | "
                                f"🔴{s['sell']+s['strong_sell']:>3} Sell")
                  except Exception as e:
                      print(f"  ⚠️  Result read error: {e}")
              else:
                  print(f"  ❌ Scan #{count} failed (exit {r.returncode})")

              # Wait exactly 3 minutes from scan start
              wait = max(30, INTERVAL - (time.time() - start) % INTERVAL)
              rem  = int((MAX_SECS - elapsed) // 60)
              print(f"\n  ⏳ Next scan in {int(wait)}s | "
                    f"Total runs: {count} | "
                    f"Remaining: ~{rem}m")
              time.sleep(wait)

          print(f"\n✅ Loop ended — {count} scans completed")
          PYEOF

      - name: 📁 Upload Final Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-run${{ github.run_number }}
          path: data/scanner-results.json
          retention-days: 7
