name: 🔍 NSE Scanner Test

on:
  workflow_dispatch:
    inputs:
      universe:
        description: 'Stock Universe'
        required: true
        default: 'banknifty'
        type: choice
        options:
          - banknifty
          - nifty50
          - nifty100
      timeframes:
        description: 'Timeframes to scan'
        required: true
        default: '1d'
        type: choice
        options:
          - 1d
          - 1wk
          - 1h
          - 30m
          - 15m
          - 5m
          - 1d 1wk
          - 1d 1h
          - 15m 30m 1h
          - 5m 15m 30m 1h 1d 1wk

  schedule:
    - cron: '30 10 * * 1-5'

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy requests

      - name: 🔍 Run NSE Scanner
        run: |
          python3 scripts/scanner/stock_scanner.py \
            --universe ${{ github.event.inputs.universe || 'banknifty' }} \
            --timeframes ${{ github.event.inputs.timeframes || '1d' }}

      - name: 📊 Show Scan Results
        run: |
          python3 -c "
          import json
          with open('data/scanner-results.json') as f:
              data = json.load(f)
          print(f'Universe : {data[\"_universe\"]}')
          print(f'Updated  : {data[\"_updated_at\"]}')
          print(f'Market   : {data[\"_market\"][\"status\"]}')
          print()
          for tf, summary in data['summary'].items():
              print(f'── Timeframe: {tf.upper()} ──')
              print(f'  Total   : {summary[\"total_scanned\"]}')
              print(f'  Strong Buy : {summary[\"strong_buy\"]}')
              print(f'  Buy        : {summary[\"buy\"]}')
              print(f'  Neutral    : {summary[\"neutral\"]}')
              print(f'  Sell       : {summary[\"sell\"]}')
              print(f'  Strong Sell: {summary[\"strong_sell\"]}')
              print(f'  Pattern    : {summary[\"with_pattern\"]}')
              print()
              results = data['results'].get(tf, [])
              strong_buys = [r for r in results if r['signal'] == 'STRONG BUY']
              buys        = [r for r in results if r['signal'] == 'BUY']
              sells       = [r for r in results if r['signal'] in ['SELL','STRONG SELL']]
              if strong_buys:
                  print('  STRONG BUY:')
                  for r in strong_buys[:10]:
                      pats = ', '.join(r['patterns']['bullish'][:2]) if r['patterns']['bullish'] else '-'
                      print(f'    {r[\"symbol\"]:15} LTP:{r[\"ltp\"]:>10}  RSI:{str(r[\"rsi\"]):>6}  {pats}')
              if buys:
                  print('  BUY:')
                  for r in buys[:10]:
                      pats = ', '.join(r['patterns']['bullish'][:2]) if r['patterns']['bullish'] else '-'
                      print(f'    {r[\"symbol\"]:15} LTP:{r[\"ltp\"]:>10}  RSI:{str(r[\"rsi\"]):>6}  {pats}')
              if sells:
                  print('  SELL:')
                  for r in sells[:10]:
                      pats = ', '.join(r['patterns']['bearish'][:2]) if r['patterns']['bearish'] else '-'
                      print(f'    {r[\"symbol\"]:15} LTP:{r[\"ltp\"]:>10}  RSI:{str(r[\"rsi\"]):>6}  {pats}')
          "

      - name: 📁 Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: scanner-results-${{ github.event.inputs.universe || 'banknifty' }}-run${{ github.run_number }}
          path: data/scanner-results.json
          retention-days: 7
